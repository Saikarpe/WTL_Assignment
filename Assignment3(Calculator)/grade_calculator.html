<!DOCTYPE html>
<html>

<head>
    <title>Student Grade Calculator</title>
</head>

<body>
    <h2>Student Grade Calculator</h2>

    <label>Subject 1 (Math):</label>
    <input type="number" id="sub1"><br><br>

    <label>Subject 2 (Science):</label>
    <input type="number" id="sub2"><br><br>

    <label>Subject 3 (English):</label>
    <input type="number" id="sub3"><br><br>

    <button onclick="calculate()">Calculate</button>

    <h3>Results:</h3>
    <p id="total"></p>
    <p id="percentage"></p>
    <p id="grade"></p>

    <script>
        function calculate() {
            // 1. Get values from text fields
            let m1 = document.getElementById("sub1").value;
            let m2 = document.getElementById("sub2").value;
            let m3 = document.getElementById("sub3").value;

            // 2. Validate empty inputs
            if (m1 === "" || m2 === "" || m3 === "") {
                alert("Please enter marks for all 3 subjects!");
                return;
            }

            // Convert text to numbers
            m1 = Number(m1);
            m2 = Number(m2);
            m3 = Number(m3);

            // 3. Validate valid number range
            if (m1 < 0 || m1 > 100 || m2 < 0 || m2 > 100 || m3 < 0 || m3 > 100) {
                alert("Invalid entry! Marks must be between 0 and 100.");
                return;
            }

            // 4. Calculate total and percentage
            let totalMarks = m1 + m2 + m3;
            let percent = (totalMarks / 300) * 100;
            let grade = "";

            // 5. Check grade
            if (percent >= 90) {
                grade = "A+";
            } else if (percent >= 80) {
                grade = "A";
            } else if (percent >= 70) {
                grade = "B";
            } else if (percent >= 60) {
                grade = "C";
            } else if (percent >= 50) {
                grade = "D";
            } else {
                grade = "F";
            }

            // 6. Display dynamically using DOM manipulation
            document.getElementById("total").innerText = "Total Marks: " + totalMarks;
            document.getElementById("percentage").innerText = "Percentage: " + percent.toFixed(2) + "%";
            document.getElementById("grade").innerText = "Grade: " + grade;
        }
    </script>
</body>

</html>
