<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Grade Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator-card {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h2>Grade Calculator</h2>
        
        <div class="input-group">
            <label for="marks">Enter your marks (out of 100):</label>
            <input type="number" id="marks" placeholder="e.g. 85" min="0" max="100">
        </div>

        <button onclick="calculateGrade()">Calculate Grade</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateGrade() {

            const marksInput = document.getElementById('marks').value;
            const resultDiv = document.getElementById('result');
            
            const marks = Number(marksInput);

            if (marksInput === '' || isNaN(marks) || marks < 0 || marks > 100) {
                resultDiv.innerHTML = "<span style='color: red;'>Please enter a valid number between 0 and 100.</span>";
                return;
            }
            let grade = '';
            if (marks >= 90) {
                grade = 'A+';
            } else if (marks >= 80) {
                grade = 'A';
            } else if (marks >= 70) {
                grade = 'B';
            } else if (marks >= 60) {
                grade = 'C';
            } else if (marks >= 50) {
                grade = 'D';
            } else {
                grade = 'F';
            }
            resultDiv.innerHTML = `Your Marks: <strong>${marks}</strong> <br> Your Grade: <strong>${grade}</strong>`;
        }
    </script>
</body>
</html>
