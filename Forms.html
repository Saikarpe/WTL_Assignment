<!DOCTYPE html>
<html>
<head>
    <title>Dynamic CRUD Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #crudForm {
            margin-top: 20px;
        }
        
        input[type="text"] {
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button[type="submit"] {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background: #45a049;
        }

        select {
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h2>Select Operation</h2>

<select id="operation">
    <option value="">--Select--</option>
    <option value="create">Create</option>
    <option value="update">Update</option>
    <option value="delete">Delete</option>
    <option value="read">Read</option>
</select>

<form id="crudForm" method="post" style="display:none; margin-top:20px;">

    <div id="nameField">
        Name:<br>
        <input type="text" name="name1"><br><br>
    </div>

    <div id="marksField">
        Marks:<br>
        <input type="text" name="mark1"><br><br>
    </div>

    <div id="rollField">
        Roll No:<br>
        <input type="text" name="rollno1"><br><br>
    </div>

    <button type="submit">Submit</button>

</form>

<script>
const operation = document.getElementById("operation");
const form = document.getElementById("crudForm");

const nameField = document.getElementById("nameField");
const marksField = document.getElementById("marksField");
const rollField = document.getElementById("rollField");

operation.addEventListener("change", () => {

    const op = operation.value;

    if(op === "") {
        form.style.display = "none";
        return;
    }

    form.style.display = "block";

    nameField.style.display = "none";
    marksField.style.display = "none";
    rollField.style.display = "none";

    if(op === "create") {
        nameField.style.display = "block";
        marksField.style.display = "block";
        rollField.style.display = "block";
        form.action = "create.php";
    }

    else if(op === "update") {
        nameField.style.display = "block";
        marksField.style.display = "block";
        rollField.style.display = "block";
        form.action = "update.php";
    }

    else if(op === "delete") {
        rollField.style.display = "block";
        form.action = "delete.php";
    }

    else if(op === "read") {
        
        form.action = "read.php";
    }
});
</script>

</body>
</html>
